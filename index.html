<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026新北市雙語榮耀表揚活動座位查詢系統</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    .header {
      background: linear-gradient(135deg, #0f4c81, #2563eb);
      color: white;
      padding: 30px 18px 26px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.45;
      letter-spacing: 0.5px;
    }
    .header p { margin: 10px 0 0; font-size: 16px; opacity: 0.95; }
    .container { max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }
    .search-box { display: flex; gap: 10px; }
    input {
      flex: 1;
      padding: 15px 16px;
      font-size: 18px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      outline: none;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    button {
      padding: 14px 22px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: 700;
      min-width: 96px;
    }
    button:hover { background: #1d4ed8; }
    .quick-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .quick-buttons button {
      min-width: auto;
      padding: 8px 12px;
      font-size: 14px;
      background: #e0ecff;
      color: #1e40af;
    }
    .hint { margin-top: 14px; color: #64748b; font-size: 15px; line-height: 1.75; }
    .status { font-size: 18px; font-weight: 800; margin-bottom: 12px; }
    .warning {
      background: #fff7ed;
      color: #c2410c;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 14px;
      font-weight: 700;
      line-height: 1.6;
    }
    .result-item {
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      background: #ffffff;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.05);
    }
    .result-title {
      font-size: 16px;
      font-weight: 800;
      color: #1d4ed8;
      margin-bottom: 14px;
      line-height: 1.7;
    }
    .tag {
      display: inline-block;
      background: #dbeafe;
      color: #1e40af;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 13px;
      margin: 3px 4px 3px 0;
      vertical-align: middle;
    }
    .main-result {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
      flex-wrap: wrap;
    }
    .seat-highlight {
      display: inline-block;
      background: #dc2626;
      color: white;
      font-weight: 900;
      font-size: 26px;
      padding: 8px 18px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(220, 38, 38, 0.35);
      letter-spacing: 0.5px;
    }
    .person-block { line-height: 1.7; }
    .person-name { font-size: 24px; font-weight: 900; color: #111827; }
    .school-name { font-size: 18px; font-weight: 800; color: #334155; }
    .award-name { font-size: 16px; color: #475569; }
    mark {
      background: #fef08a;
      color: #111827;
      padding: 1px 4px;
      border-radius: 4px;
      font-weight: 900;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .detail-item {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.6;
    }
    .detail-label { color: #64748b; font-size: 13px; }
    .detail-value { color: #111827; font-size: 15px; font-weight: 700; word-break: break-word; }
    .no-data {
      text-align: center;
      color: #64748b;
      font-size: 18px;
      padding: 26px;
      line-height: 1.8;
    }
    .footer {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      margin: 24px 0;
      line-height: 1.8;
    }
    .small { font-size: 13px; color: #64748b; line-height: 1.7; }
    @media (max-width: 600px) {
      .header h1 { font-size: 23px; }
      .header p { font-size: 14px; }
      .container { margin-top: 16px; padding: 0 12px; }
      .card { padding: 18px; border-radius: 16px; }
      .search-box { flex-direction: column; }
      input, button { width: 100%; font-size: 17px; }
      .seat-highlight { font-size: 24px; padding: 7px 15px; }
      .person-name { font-size: 22px; }
      .school-name { font-size: 17px; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>2026新北市雙語榮耀表揚活動<br>座位查詢系統</h1>
    <p>可輸入姓名、學校名稱、獎項、職稱或座位號碼查詢</p>
  </div>

  <div class="container">
    <div class="card">
      <div class="search-box">
        <input
          type="text"
          id="keywordInput"
          placeholder="請輸入姓名、學校、獎項或座位，例如：陳宜蓁、樟樹、金腦獎、D1"
          autocomplete="off"
          onkeydown="if(event.key === 'Enter') searchData();"
        />
        <button onclick="searchData()">查詢</button>
      </div>

      <div class="quick-buttons">
        <button onclick="setPlaceholder('請輸入姓名')">姓名查詢</button>
        <button onclick="setPlaceholder('請輸入學校名稱')">學校查詢</button>
        <button onclick="setPlaceholder('請輸入獎項或職稱')">獎項／職稱查詢</button>
        <button onclick="setPlaceholder('請輸入座位號碼')">座位查詢</button>
        <button onclick="clearSearch()">清除</button>
      </div>

      <div class="hint">
        查詢說明：<br>
        1. 本版支援新版 Excel 結構：座位、學校、職稱、姓名、獎項分欄顯示。<br>
        2. 查詢結果會整理成單筆卡片，不顯示整列無關資料。<br>
        3. 若同一人、同一學校或同一獎項出現在多個工作表，系統會全部列出。<br>
        4. 座位號碼會以紅底白字醒目標示。
      </div>
    </div>

    <div id="resultArea"></div>

    <div class="footer">
      新北市雙語榮耀表揚活動座位查詢系統<br>
      <span class="small">查詢網址：https://jicts.github.io/glory-query/</span>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbziDFFiIamUq2_Wh3_9JG6l9U1JXdZJMQpDZpIFw0-koAvn0BxP27RmCdFuwnQAyrbl/exec";

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "jsonpCallback_" + Date.now();
        const script = document.createElement("script");

        window[callbackName] = function(data) {
          resolve(data);
          delete window[callbackName];
          if (script.parentNode) document.body.removeChild(script);
        };

        script.onerror = function() {
          reject(new Error("查詢失敗，請確認 Apps Script 是否已部署為「任何人」可存取。"));
          delete window[callbackName];
          if (script.parentNode) document.body.removeChild(script);
        };

        script.src = url + "&callback=" + callbackName;
        document.body.appendChild(script);
      });
    }

    async function searchData() {
      const keyword = document.getElementById("keywordInput").value.trim();
      const resultArea = document.getElementById("resultArea");

      if (!keyword) {
        resultArea.innerHTML = `<div class="card no-data">請先輸入查詢關鍵字</div>`;
        return;
      }

      resultArea.innerHTML = `<div class="card no-data">查詢中，請稍候...</div>`;

      try {
        const url = API_URL + "?q=" + encodeURIComponent(keyword);
        const data = await jsonp(url);

        if (!data.success || data.count === 0) {
          resultArea.innerHTML = `
            <div class="card no-data">
              查無資料：${escapeHtml(keyword)}<br>
              <span class="small">請確認姓名、學校名稱、獎項或座位號碼是否輸入正確。</span>
            </div>
          `;
          return;
        }

        const rows = data.results.map(item => buildStructuredItem(item, keyword));

        let html = `
          <div class="card">
            <div class="status">
              查詢「${escapeHtml(keyword)}」共找到 ${rows.length} 筆資料
            </div>
        `;

        if (rows.length > 1) {
          html += `
            <div class="warning">
              ⚠️ 多筆／重複資料提醒：系統找到 ${rows.length} 筆符合資料，請確認工作表、獎項與座位資訊。
            </div>
          `;
        }

        html += `</div>`;

        rows.forEach((item, index) => {
          const detailHtml = item.details.map(d => `
            <div class="detail-item">
              <div class="detail-label">${escapeHtml(d.label)}</div>
              <div class="detail-value">${highlightKeyword(escapeHtml(d.value), keyword)}</div>
            </div>
          `).join("");

          html += `
            <div class="result-item">
              <div class="result-title">
                第 ${index + 1} 筆
                <span class="tag">工作表：${escapeHtml(item.sheet)}</span>
                <span class="tag">第 ${item.rowNumber} 列</span>
              </div>

              <div class="main-result">
                ${item.seat ? `<span class="seat-highlight">${escapeHtml(item.seat)}</span>` : ""}
                <div class="person-block">
                  <div class="person-name">${highlightKeyword(escapeHtml(item.name || item.mainText), keyword)}</div>
                  ${item.school ? `<div class="school-name">${highlightKeyword(escapeHtml(item.school), keyword)}</div>` : ""}
                  ${item.award ? `<div class="award-name">${highlightKeyword(escapeHtml(item.award), keyword)}</div>` : ""}
                </div>
              </div>

              <div class="detail-grid">
                ${detailHtml}
              </div>
            </div>
          `;
        });

        resultArea.innerHTML = html;

      } catch (error) {
        resultArea.innerHTML = `
          <div class="card no-data">
            查詢失敗，請確認 Apps Script 部署權限是否設為「任何人」。<br><br>
            錯誤訊息：${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    function buildStructuredItem(item, keyword) {
      const headers = item.header2 || [];
      const row = item.match || [];

      function valueByHeader(patterns) {
        for (let i = 0; i < headers.length; i++) {
          const h = String(headers[i] || "").trim();
          if (!h) continue;
          if (patterns.some(p => h.includes(p))) {
            const v = String(row[i] || "").trim();
            if (v) return v;
          }
        }
        return "";
      }

      function collectDetails() {
        const details = [];
        for (let i = 0; i < headers.length; i++) {
          const label = String(headers[i] || "").trim();
          const value = String(row[i] || "").trim();
          if (!label || !value) continue;
          details.push({ label, value });
        }
        return details;
      }

      let seat = valueByHeader(["序號", "座位"]);
      if (!seat) {
        seat = row.map(c => String(c || "").trim()).find(v => /^[A-Z][0-9]{1,3}$/.test(v)) || "";
      }

      const school = valueByHeader(["學校名稱", "學校", "單位名稱", "單位"]);
      const position = valueByHeader(["職稱"]);
      const name = valueByHeader(["姓名", "獲獎人", "指導老師", "指導教師"]);
      const award = valueByHeader(["獎項", "競賽組別", "考科"]);
      const matchedCell = row.map(c => String(c || "").trim()).find(v => v.includes(keyword)) || "";
      const mainText = [school, position, name || matchedCell, award].filter(Boolean).join("　");

      return {
        sheet: item.sheet,
        rowNumber: item.rowNumber,
        seat,
        school,
        position,
        name: name || matchedCell,
        award: [position, award].filter(Boolean).join("　"),
        mainText,
        details: collectDetails()
      };
    }

    function setPlaceholder(text) {
      const input = document.getElementById("keywordInput");
      input.placeholder = text;
      input.focus();
    }

    function clearSearch() {
      document.getElementById("keywordInput").value = "";
      document.getElementById("resultArea").innerHTML = "";
      document.getElementById("keywordInput").focus();
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function highlightKeyword(text, keyword) {
      const safeKeyword = escapeHtml(keyword);
      if (!safeKeyword) return text;
      return text.replaceAll(safeKeyword, `<mark>${safeKeyword}</mark>`);
    }
  </script>
</body>
</html>
